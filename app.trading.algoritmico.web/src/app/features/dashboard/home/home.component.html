<div class="home">

  <!-- KPI Cards Grid -->
  <div class="home__kpi-grid">
    @for (kpi of kpiCards; track kpi.titleKey) {
      <div class="c-kpi-card">
        <p class="c-kpi-card__title">{{ kpi.titleKey | translate }}</p>
        <p
          class="c-kpi-card__value"
          [class.c-kpi-card__value--gain]="kpi.type === 'gain'"
          [class.c-kpi-card__value--stable]="kpi.type === 'stable'"
        >
          {{ kpi.value }}
        </p>
      </div>
    }
  </div>

  <!-- Activity Card -->
  <div class="c-activity-card">
    <div class="c-activity-card__bg"></div>
    <div class="c-activity-card__content">
      <span class="c-activity-card__badge">
        {{ 'DASHBOARD.HOME.ACTIVITY_BADGE' | translate }}
      </span>
      <div class="c-activity-card__footer">
        <div class="c-activity-card__tasks">
          <p class="c-activity-card__tasks-label">
            {{ 'DASHBOARD.HOME.TASKS_LABEL' | translate: { completed: taskProgress.completed, total: taskProgress.total } }}
          </p>
          <div class="c-activity-card__progress">
            <div
              class="c-activity-card__progress-bar"
              [style.width.%]="taskProgressPercent"
            ></div>
          </div>
        </div>
        <button class="c-activity-card__arrow" [attr.aria-label]="'COMMON.ACTIONS.VIEW_DETAILS' | translate">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>
