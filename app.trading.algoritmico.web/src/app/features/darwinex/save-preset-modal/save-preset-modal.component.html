<div class="modal-backdrop" (click)="onCancel()">
  <div class="modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <header class="modal__header">
      <h2 class="modal__title">Save Preset</h2>
      <button class="modal__close" type="button" (click)="onCancel()" aria-label="Close">
        &times;
      </button>
    </header>

    <div class="modal__body">
      <div class="form-field">
        <label class="form-field__label" for="preset-name">Preset Name</label>
        <input
          id="preset-name"
          class="form-field__input"
          type="text"
          [value]="presetName()"
          (input)="presetName.set($any($event.target).value)"
          placeholder="e.g. Performance view"
          autocomplete="off"
        />
      </div>
    </div>

    <footer class="modal__footer">
      <button class="btn btn--secondary" type="button" (click)="onCancel()">Cancel</button>
      <button class="btn btn--primary" type="button" [disabled]="!canSave()" (click)="onSave()">
        Save
      </button>
    </footer>
  </div>
</div>
