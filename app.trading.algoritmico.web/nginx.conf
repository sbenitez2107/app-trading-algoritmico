server {
    listen      80;
    server_name _;

    # Match Kestrel upload limit (SQX HTML reports up to ~200MB)
    client_max_body_size 200m;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Reverse proxy: REST controllers ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    # ── Reverse proxy: Swagger UI + JSON ──────────────────────────────────────
    location /swagger/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (Angular outputHashing=all)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Never cache index.html — it pins the hashed bundle versions
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
